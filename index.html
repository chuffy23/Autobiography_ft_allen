<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autobiography by Allen</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(40px, -200px) rotate(360deg) scale(0.5); opacity: 0; }
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }
        .animate-drift { animation: drift linear infinite; }
        .animate-float { animation: float linear infinite; }
        .animate-sway { animation: sway ease-in-out infinite; animation-duration: 4s; }

        .bg-sage-200 { background-color: #A8C3A0; }
        .bg-sage-100 { background-color: #E2F0CB; }
        .bg-sage-50 { background-color: #f1f5f0; }
        .text-sage-600 { color: #4b6b45; }
        .border-sage-200 { border-color: #A8C3A0; }
        .border-sage-100 { border-color: #d1dfcd; }
        
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .rotate-y-180 { transform: rotateY(180deg); }

        /* Notebook Paper Effect */
        .notebook-paper {
            background-color: #fff;
            background-image: 
                linear-gradient(rgba(168, 195, 160, 0.15) 1px, transparent 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
            padding-top: 2.5rem;
        }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const apiKey = ""; 

        // --- Helper Utilities ---
        const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw error;
            }
        };

        const pcmToWav = (pcmData, sampleRate) => {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(44 + i * 2, pcmData[i], true);
            }
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const Icon = ({ name, className, size = 20 }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    i.setAttribute('data-lucide', kebabName);
                    if (className) i.className = className;
                    i.style.width = `${size}px`;
                    i.style.height = `${size}px`;
                    i.style.display = 'inline-block';
                    ref.current.appendChild(i);
                    if (window.lucide) {
                        window.lucide.createIcons({
                            attrs: { width: size, height: size, 'stroke-width': 2 }
                        });
                    }
                }
            }, [name, className, size]);
            return <span ref={ref} className="inline-flex items-center justify-center leading-none"></span>;
        };

        const App = () => {
            // --- State ---
            const [view, setView] = useState('home');
            const [commSubView, setCommSubView] = useState('guestbook');
            const [isNight, setIsNight] = useState(false);
            const [isMuted, setIsMuted] = useState(true);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            
            const [activePrompt, setActivePrompt] = useState("Click to generate a ✨ special reflection prompt...");
            const [wisdom, setWisdom] = useState("");
            const [newComment, setNewComment] = useState("");
            const [analyzedMemory, setAnalyzedMemory] = useState("");
            const [showWisdomModal, setShowWisdomModal] = useState(false);
            const [currentWisdom, setCurrentWisdom] = useState("");
            const [gardenSpirit, setGardenSpirit] = useState("");
            const [dreamVision, setDreamVision] = useState("");
            const [dreamPrompt, setDreamPrompt] = useState("");
            const [shiftedPrompt, setShiftedPrompt] = useState("");
            const [rawJourneyEvent, setRawJourneyEvent] = useState("");
            const [diaryEntry, setDiaryEntry] = useState("");
            const [savedDiaryEntries, setSavedDiaryEntries] = useState([]);
            const [driveEntries, setDriveEntries] = useState([]);

            const [comments, setComments] = useState([
                { name: "Sophie", text: "This place feels so peaceful. Thank you for sharing, Allen.", likes: 12, category: "Memories" },
                { name: "Haku", text: "The garden visualization is such a beautiful touch.", likes: 8, category: "Philosophy" }
            ]);

            const [journey, setJourney] = useState([
                { year: "1998", title: "The Beginning", desc: "Born in a quiet town where the wind always smelled like rain.", category: "Early Life" },
                { year: "2010", title: "The Curious Student", desc: "Found my first journal. I realized that words could build worlds.", category: "School" },
                { year: "2018", title: "Crossing the Valley", desc: "A difficult period that taught me the strength of silence and resilience.", category: "Struggles" },
                { year: "2024", title: "The Present Garden", desc: "Cultivating stories and helping others find their own voice.", category: "Current" }
            ]);

            const audioRef = useRef(null);

            // --- Computed ---
            const gardenPlants = useMemo(() => {
                return comments.map((c, i) => ({
                    id: i,
                    color: ({"Philosophy": "#FF9AA2", "Memories": "#C7CEEA", "Life Advice": "#FFDAC1"})[c.category] || "#E2F0CB",
                    size: i === 0 ? "scale-125" : "scale-100",
                    delay: `${i * 0.2}s`,
                    label: c.text.substring(0, 20) + "..."
                })).slice(0, 8);
            }, [comments]);

            // --- AI & Interaction Methods ---

            const askTheWind = async () => {
                setAiLoading(true);
                setWisdom("");
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Give me wisdom." }] }],
                            systemInstruction: { parts: [{ text: "Provide a short piece of calm, Ghibli-esque wisdom about life. Max 20 words." }] }
                        })
                    });
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) setWisdom(text.trim());
                } catch (err) {
                    setWisdom("Listen closely... the wind is whispering elsewhere right now.");
                } finally {
                    setAiLoading(false);
                }
            };

            const downloadSite = () => {
                const htmlContent = document.documentElement.outerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'autobiography-by-allen.html';
                link.click();
            };

            const openWisdomModal = async (fact) => {
                setShowWisdomModal(true);
                setCurrentWisdom("✨ Consulting the stars...");
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `User fact: "${fact.front}: ${fact.back}". Reflect in Ghibli style. Max 20 words.` }] }],
                            systemInstruction: { parts: [{ text: "You are a poetic narrator finding beauty in small details." }] }
                        })
                    });
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    setCurrentWisdom(text || "The wind whispers of secrets only quiet hearts can hear.");
                } catch (err) {
                    setCurrentWisdom("In the silence of a tea leaf, an entire world is hidden.");
                }
            };

            const generateGardenSpirit = async () => {
                setAiLoading(true);
                const allComments = comments.map(c => c.text).join(" | ");
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Synthesis of: "${allComments}". Theme: Garden Spirit Weather Report. Ghibli tone. Max 2 sentences.` }] }],
                            systemInstruction: { parts: [{ text: "You are the ancient Spirit of the Garden." }] }
                        })
                    });
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    setGardenSpirit(text?.trim() || "The garden hums with the warmth of shared stories.");
                } catch (err) {
                    setGardenSpirit("The leaves rustle with a thousand whispers of kindness.");
                } finally { setAiLoading(false); }
            };

            const generateVision = async () => {
                if (!dreamPrompt.trim()) return;
                setAiLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt: `Studio Ghibli style: ${dreamPrompt}. Soft lighting, detailed backgrounds.` },
                            parameters: { sampleCount: 1 }
                        })
                    });
                    const data = await response.json();
                    if (data.predictions?.[0]?.bytesBase64Encoded) {
                        setDreamVision(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                    }
                } catch (err) {
                    console.error("Image generation failed:", err);
                } finally { setAiLoading(false); }
            };

            const shiftPerspective = async () => {
                if (aiLoading) return;
                setAiLoading(true);
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Interpret this: "${activePrompt}" from eyes of a forest spirit. Max 25 words.` }] }],
                            systemInstruction: { parts: [{ text: "You are a wandering spirit in a digital garden." }] }
                        })
                    });
                    setShiftedPrompt(result.candidates[0].content.parts[0].text.trim());
                } catch (err) {
                    setShiftedPrompt("Even the smallest spirits are quieted by the beauty of this thought.");
                } finally { setAiLoading(false); }
            };

            const chroniclerEntry = async () => {
                if (!rawJourneyEvent.trim()) return;
                setAiLoading(true);
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Milestone: "${rawJourneyEvent}". JSON: year, title, desc, category.` }] }],
                            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { year: {type: "string"}, title: {type: "string"}, desc: {type: "string"}, category: {type: "string"} } } },
                            systemInstruction: { parts: [{ text: "You are The Chronicler." }] }
                        })
                    });
                    const entry = JSON.parse(result.candidates[0].content.parts[0].text);
                    setJourney([...journey, entry]);
                    setRawJourneyEvent("");
                } catch (err) {
                    console.error("Chronicle failed:", err);
                } finally { setAiLoading(false); }
            };

            const generateAIPrompt = async () => {
                if (aiLoading) return;
                setAiLoading(true);
                setShiftedPrompt("");
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "New prompt." }] }],
                            systemInstruction: { parts: [{ text: "Generate a profound Ghibli-inspired reflection prompt. Max 1 sentence." }] }
                        })
                    });
                    setActivePrompt(result.candidates[0].content.parts[0].text.trim());
                } catch (err) {
                    setActivePrompt("The wind is quiet today. Try again later.");
                } finally { setAiLoading(false); }
            };

            const speakWisdom = async (text) => {
                if (!text) return;
                setAiLoading(true);
                try {
                    const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Gently: ${text}` }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const part = response.candidates[0].content.parts[0];
                    const pcmBytes = Uint8Array.from(atob(part.inlineData.data), c => c.charCodeAt(0));
                    const wavBlob = pcmToWav(new Int16Array(pcmBytes.buffer), parseInt(part.inlineData.mimeType.split('rate=')[1]) || 24000);
                    if (audioRef.current) { audioRef.current.src = URL.createObjectURL(wavBlob); audioRef.current.play(); }
                } catch (err) { console.error("TTS failed:", err); } finally { setAiLoading(false); }
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setAiLoading(true);
                setAnalyzedMemory("");
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    try {
                        const imgRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "Transform to Studio Ghibli style anime illustration." }, { inlineData: { mimeType: file.type, data: base64Data } }] }],
                                generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                            })
                        });
                        const ghibliBase64 = imgRes.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        const transformedImg = ghibliBase64 ? `data:image/png;base64,${ghibliBase64}` : reader.result;

                        const textRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ role: "user", parts: [{ text: "Write Ghibli reflection." }, { inlineData: { mimeType: file.type, data: base64Data } }] }],
                                systemInstruction: { parts: [{ text: "Write one poetic sentence." }] }
                            })
                        });
                        const comment = textRes.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "A dream frozen in time.";
                        setAnalyzedMemory(comment);
                        setDriveEntries([{ id: Date.now(), image: transformedImg, comment, date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) }, ...driveEntries]);
                    } catch (err) {
                        console.error("Memory scanning failed:", err);
                    } finally { setAiLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            const handlePost = async () => {
                if (!newComment.trim()) return;
                setAiLoading(true);
                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: newComment }] }],
                            systemInstruction: { parts: [{ text: "Categorize: Philosophy, Memories, or Life Advice. Output only the word." }] }
                        })
                    });
                    const category = result.candidates[0].content.parts[0].text.trim();
                    setComments([{ name: "Guest", text: newComment, likes: 0, category }, ...comments]);
                    setNewComment("");
                } catch (err) {
                   setComments([{ name: "Guest", text: newComment, likes: 0, category: "Philosophy" }, ...comments]);
                   setNewComment("");
                } finally { setAiLoading(false); }
            };

            const facts = [
                { front: "Favorite Drink", back: "Hot Jasmine Tea with a hint of honey." },
                { front: "Ideal Morning", back: "Watching the fog lift from a balcony." },
                { front: "Secret Talent", back: "Can identify most trees by their leaves." },
                { front: "Current Read", back: "A collection of haikus from the 17th century." }
            ];

            const theme = isNight ? "bg-[#1a2533] text-slate-200" : "bg-[#F5E9DC] text-slate-800";

            return (
                <div className={`min-h-screen ${theme} transition-colors duration-1000 relative`}>
                    <audio ref={audioRef} className="hidden" />
                    
                    {/* Modals */}
                    {showWisdomModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm" onClick={() => setShowWisdomModal(false)}>
                            <div className={`max-w-md w-full p-8 rounded-[2.5rem] border shadow-2xl relative ${isNight ? 'bg-slate-800 border-slate-700' : 'bg-white border-sage-100'}`} onClick={e => e.stopPropagation()}>
                                <button className="absolute top-6 right-6 p-2 hover:bg-black/5 rounded-full transition-colors" onClick={() => setShowWisdomModal(false)}><Icon name="X" /></button>
                                <div className="text-center min-h-[120px] flex flex-col justify-center">
                                    <Icon name="Sparkles" className="mx-auto mb-6 text-amber-500" size={32} />
                                    <h2 className="text-2xl font-bold mb-4">✨ Soulful Insight</h2>
                                    <p className="text-lg italic">{currentWisdom}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Ambient BG */}
                    <div className="fixed inset-0 pointer-events-none z-0">
                        {[...Array(15)].map((_, i) => (
                            <div key={i} className={`absolute animate-float ${isNight ? 'bg-amber-200 w-1 h-1 rounded-full' : 'text-sage-300/30'}`}
                                style={{ left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 5}s`, animationDuration: `${15 + Math.random() * 20}s` }}>
                                {!isNight && <Icon name="Leaf" size={14 + Math.random() * 10} />}
                            </div>
                        ))}
                        {!isNight && (
                            <div className="opacity-40">
                                <Icon name="Cloud" className="absolute top-20 -left-40 animate-drift" size={180} />
                                <Icon name="Cloud" className="absolute top-80 -left-40 animate-drift" size={120} />
                            </div>
                        )}
                    </div>

                    <nav className={`fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center transition-all ${isNight ? 'bg-[#1a2533]/80 border-slate-700' : 'bg-[#F5E9DC]/80 border-sage-200'} backdrop-blur-md border-b`}>
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
                            <Icon name="Flower" size={24} className="text-sage-600" />
                            <span className="text-xl font-bold">Allen</span>
                        </div>
                        <div className="hidden md:flex space-x-6">
                            {['home', 'garden', 'journey', 'prompts', 'community'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`capitalize text-sm font-medium ${view === v ? 'text-sage-600 font-bold' : 'opacity-60'}`}>{v}</button>
                            ))}
                        </div>
                        <div className="flex items-center space-x-4">
                            <button onClick={downloadSite} className="p-2 hover:bg-black/5 rounded-full"><Icon name="Download" size={18}/></button>
                            <button onClick={() => setIsNight(!isNight)}>{isNight ? <Icon name="Sun" /> : <Icon name="Moon" />}</button>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}><Icon name={isMenuOpen ? "X" : "Menu"} /></button>
                        </div>
                    </nav>

                    <main className="pt-32 pb-24 px-6 max-w-5xl mx-auto relative z-10">
                        {view === 'home' && (
                            <div className="text-center space-y-12 animate-in fade-in duration-1000">
                                <h1 className="text-6xl md:text-8xl font-black leading-tight tracking-tighter">Stories <span className="text-sage-600">Breathe</span> in Silence.</h1>
                                <p className="text-xl opacity-70 max-w-2xl mx-auto">Welcome to my digital garden. Every word here is a seed.</p>
                                
                                <div onClick={() => setView('diary')} className={`inline-flex items-start space-x-4 p-6 rounded-3xl text-left max-w-md mx-auto border shadow-sm cursor-pointer transition-all hover:scale-[1.02] ${isNight ? 'bg-slate-800/40 border-slate-700' : 'bg-white border-sage-100'}`}>
                                    <Icon name="History" size={24} className="text-sage-600" />
                                    <div>
                                        <span className="text-xs font-bold uppercase text-sage-600">Memory — May 4th</span>
                                        <p className="text-sm italic opacity-80 mt-1">"Started the first draft under an old oak tree."</p>
                                        <div className="mt-2 text-[10px] uppercase font-bold text-sage-600 flex items-center space-x-1"><Icon name="PenTool" size={10} /><span>Open Diary</span></div>
                                    </div>
                                </div>

                                <section className="pt-12 text-left">
                                    <div className="flex items-center space-x-4 mb-8"><Icon name="Info" className="text-sage-500" /><h2 className="text-2xl font-bold">Quick Facts</h2></div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                                        {facts.map((fact, i) => (
                                            <div key={i} className="h-32 perspective cursor-pointer" onClick={() => openWisdomModal(fact)}>
                                                <div className="relative h-full w-full rounded-2xl transition-all duration-500 preserve-3d hover:rotate-y-180 shadow-sm border border-black/5">
                                                    <div className="absolute inset-0 flex items-center justify-center rounded-2xl p-4 backface-hidden bg-white text-slate-800"><span className="text-sm font-bold text-center">{fact.front}</span></div>
                                                    <div className="absolute inset-0 flex items-center justify-center rounded-2xl p-4 rotate-y-180 backface-hidden bg-sage-100 text-sage-800"><span className="text-xs italic text-center">{fact.back}</span></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'diary' && (
                            <div className="max-w-3xl mx-auto animate-in zoom-in-95 duration-500">
                                <div className="flex items-center justify-between mb-8"><button onClick={() => setView('home')} className="flex items-center space-x-2 opacity-60"><Icon name="ChevronLeft" /><span>Home</span></button><h2 className="text-3xl font-bold font-serif">A Soul's Journal</h2><div className="w-12"></div></div>
                                <div className="relative p-1 rounded-[2.5rem] bg-sage-200 shadow-2xl"><div className="rounded-[2.4rem] notebook-paper min-h-[500px] px-12 pb-12 bg-white text-slate-800"><textarea value={diaryEntry} onChange={e => setDiaryEntry(e.target.value)} className="w-full bg-transparent border-none outline-none resize-none font-serif text-xl italic leading-[2.5rem]" rows="15" placeholder="Begin reflecting..."></textarea></div></div>
                                <div className="mt-8 flex justify-center"><button onClick={() => { setSavedDiaryEntries([{date: new Date().toLocaleDateString(), text: diaryEntry}, ...savedDiaryEntries]); setDiaryEntry(""); setView('home'); }} disabled={!diaryEntry.trim()} className="bg-sage-600 text-white px-12 py-4 rounded-full font-bold shadow-xl disabled:opacity-50">Seal Entry</button></div>
                            </div>
                        )}

                        {view === 'garden' && (
                            <div className="text-center space-y-16 animate-in zoom-in-95 duration-500">
                                <h2 className="text-4xl font-bold">Memory Garden</h2>
                                <div className="relative h-[300px] flex items-end justify-around bg-black/5 rounded-[3rem] p-12 overflow-hidden">
                                    {gardenPlants.map(p => (
                                        <div key={p.id} className={`flex flex-col items-center animate-sway ${p.size}`} style={{ animationDelay: p.delay }}>
                                            <Icon name="Flower" size={24} style={{color: p.color}} />
                                            <div className="w-1 h-32 bg-emerald-400 rounded-full"></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-12">
                                    <div className="flex flex-col items-center space-y-6">
                                        <button onClick={generateGardenSpirit} disabled={aiLoading} className="bg-indigo-100 text-indigo-700 px-8 py-3 rounded-full font-bold flex items-center space-x-2 hover:bg-indigo-200 transition-all"><Icon name="CloudRain" /><span>✨ Weather Report</span></button>
                                        {gardenSpirit && <div className="max-w-2xl p-6 bg-indigo-50/50 rounded-[2rem] border border-indigo-100 italic">"{gardenSpirit}"</div>}
                                    </div>
                                    <div className="p-8 rounded-[2.5rem] border shadow-sm bg-white text-slate-800">
                                        <h3 className="text-2xl font-bold mb-6">✨ Vision of a Dream</h3>
                                        <div className="flex gap-4 mb-6"><input value={dreamPrompt} onChange={e => setDreamPrompt(e.target.value)} className="flex-1 bg-black/5 rounded-2xl px-6 py-4 outline-none" placeholder="Describe a dream scene..." /><button onClick={generateVision} disabled={aiLoading || !dreamPrompt.trim()} className="bg-sage-600 text-white px-8 py-4 rounded-2xl font-bold transition-transform active:scale-95">{aiLoading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Image" />}</button></div>
                                        {dreamVision && <img src={dreamVision} className="w-full rounded-3xl shadow-lg border border-sage-100" />}
                                    </div>
                                    <div className="flex flex-col items-center space-y-4 pt-8 border-t border-black/5">
                                        <label className="bg-sage-600 text-white px-8 py-4 rounded-full cursor-pointer flex items-center space-x-3 shadow-lg hover:scale-105 active:scale-95 transition-transform">
                                            <Icon name="Camera" size={20}/>
                                            <span className="font-bold">Scan Memory Photo</span>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} disabled={aiLoading} />
                                        </label>
                                        {aiLoading && !dreamVision && !gardenSpirit && <Icon name="Loader2" className="animate-spin text-sage-600" />}
                                        {analyzedMemory && <p className="italic text-lg text-sage-600 max-w-xl mx-auto">"{analyzedMemory}"</p>}
                                    </div>
                                    <div className="flex justify-center space-x-4">
                                        <button onClick={askTheWind} className="bg-amber-100 text-amber-700 px-6 py-3 rounded-full font-bold flex items-center space-x-2 hover:bg-amber-200 transition-colors shadow-sm"><Icon name="Wind" /><span>Ask the Wind</span></button>
                                        {wisdom && <button onClick={() => speakWisdom(wisdom)} className="p-3 bg-indigo-100 rounded-full hover:bg-indigo-200 transition-colors"><Icon name="Volume1" /></button>}
                                    </div>
                                    {wisdom && <p className="italic text-amber-600 text-xl">{wisdom}</p>}
                                </div>
                            </div>
                        )}

                        {view === 'journey' && (
                            <div className="max-w-2xl mx-auto space-y-12 animate-in slide-in-from-bottom-8 duration-700">
                                <div className="text-center mb-16"><h2 className="text-4xl font-bold mb-4">Path of Growth</h2><div className="h-1 w-20 bg-sage-600 mx-auto rounded-full"></div></div>
                                <div className="p-8 rounded-[2.5rem] border mb-16 bg-white text-slate-800 shadow-sm">
                                    <div className="flex items-center space-x-3 mb-4"><Icon name="Scroll" className="text-sage-600" /><span className="font-bold text-sm uppercase tracking-widest">The Chronicler</span></div>
                                    <div className="flex gap-4">
                                        <input value={rawJourneyEvent} onChange={e => setRawJourneyEvent(e.target.value)} className="flex-1 bg-black/5 rounded-2xl px-6 py-4 outline-none" placeholder="Add a life event..." />
                                        <button onClick={chroniclerEntry} disabled={aiLoading || !rawJourneyEvent.trim()} className="bg-sage-600 text-white px-6 py-4 rounded-2xl disabled:opacity-50 transition-transform active:scale-95">
                                            {aiLoading ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Plus" />}
                                        </button>
                                    </div>
                                </div>
                                <div className="space-y-12 border-l-2 border-sage-200 pl-8">
                                    {journey.map((p, i) => (
                                        <div key={i} className={`relative p-8 rounded-3xl border ${isNight ? 'bg-slate-800/40 border-slate-700' : 'bg-white/40 border-sage-100'} shadow-sm`}>
                                            <div className="absolute -left-[41px] top-4 w-4 h-4 bg-sage-600 rounded-full border-4 border-[#F5E9DC] dark:border-[#1a2533]"></div>
                                            <span className="text-sage-600 font-bold block">{p.year}</span>
                                            <h3 className="text-2xl font-bold mb-2">{p.title}</h3>
                                            <p className="opacity-70 leading-relaxed font-sans">{p.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'prompts' && (
                            <div className="text-center space-y-12 animate-in zoom-in-95 duration-500">
                                <div className="inline-block p-4 bg-sage-100 text-sage-600 rounded-3xl mb-4"><Icon name="PenTool" size={32} /></div>
                                <div className={`p-12 border-2 border-dashed border-sage-200 rounded-[3rem] min-h-[250px] flex items-center justify-center cursor-pointer transition-all ${isNight ? 'bg-slate-800' : 'bg-white'}`} onClick={generateAIPrompt}>
                                    <div className="space-y-8 max-w-2xl">
                                        <h3 className="text-3xl italic">{aiLoading ? <Icon name="Zap" className="animate-pulse text-sage-600" /> : `"${activePrompt}"`}</h3>
                                        {shiftedPrompt && <div className="pt-8 mt-8 border-t border-sage-200/40 italic text-xl font-serif text-sage-700 animate-in fade-in">{shiftedPrompt}</div>}
                                    </div>
                                </div>
                                <div className="flex justify-center space-x-4">
                                    <button onClick={generateAIPrompt} disabled={aiLoading} className="bg-sage-600 text-white px-8 py-4 rounded-full font-bold shadow-xl flex items-center space-x-2 transition-transform active:scale-95">
                                        <Icon name="RefreshCw" className={aiLoading ? "animate-spin" : ""} />
                                        <span>New Prompt</span>
                                    </button>
                                    <button onClick={shiftPerspective} disabled={aiLoading || !activePrompt.includes('"')} className="bg-indigo-100 text-indigo-700 px-8 py-4 rounded-full font-bold flex items-center space-x-2 transition-transform active:scale-95 disabled:opacity-50">
                                        <Icon name="Stars" size={18} />
                                        <span>Shift Perspective</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'community' && (
                            <div className="max-w-4xl mx-auto space-y-12 animate-in slide-in-from-right-8 duration-500">
                                <div className="flex justify-center mb-8 p-1 bg-black/5 rounded-2xl w-fit mx-auto">
                                    <button onClick={() => setCommSubView('guestbook')} className={`px-8 py-3 rounded-xl font-bold text-sm transition-all ${commSubView === 'guestbook' ? 'bg-white shadow-md text-sage-700' : 'opacity-60'}`}>Guestbook</button>
                                    <button onClick={() => setCommSubView('drive')} className={`px-8 py-3 rounded-xl font-bold text-sm transition-all ${commSubView === 'drive' ? 'bg-white shadow-md text-sage-700' : 'opacity-60'}`}>( Drive )</button>
                                </div>
                                {commSubView === 'guestbook' ? (
                                    <div className="space-y-12">
                                        <div className={`p-8 rounded-[2.5rem] shadow-xl ${isNight ? 'bg-slate-800 border-slate-700' : 'bg-white border-white/10'}`}>
                                            <div className="flex items-center space-x-2 text-sage-600 mb-4 font-bold uppercase tracking-wider text-sm"><Icon name="Coffee" /><span>Leave a thought</span></div>
                                            <textarea value={newComment} onChange={e => setNewComment(e.target.value)} className="w-full h-32 bg-transparent outline-none text-xl italic font-serif leading-relaxed" placeholder="Write a sentence..."></textarea>
                                            <div className="flex justify-end pt-4 border-t border-black/5">
                                                <button onClick={handlePost} disabled={aiLoading || !newComment.trim()} className="bg-sage-600 text-white px-8 py-3 rounded-full font-bold flex items-center space-x-2 shadow-lg transition-transform active:scale-95">
                                                    {aiLoading ? <Icon name="Stars" className="animate-spin" /> : <span>Post Thought</span>}
                                                    <Icon name="Send" size={18}/>
                                                </button>
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            {comments.map((c, i) => (
                                                <div key={i} className={`p-8 rounded-3xl border shadow-sm flex flex-col space-y-4 ${isNight ? 'bg-slate-800/30 border-slate-700' : 'bg-white/40 border-sage-100'}`}>
                                                    <div className="flex justify-between items-center">
                                                        <span className="font-bold text-sage-600 flex items-center space-x-2"><Icon name="User" size={16}/><span>{c.name}</span></span>
                                                        <span className="text-[10px] uppercase font-bold opacity-40 px-2 py-1 bg-black/5 rounded">{c.category}</span>
                                                    </div>
                                                    <p className="opacity-80 font-sans leading-relaxed">{c.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {driveEntries.length > 0 ? driveEntries.map((e) => (
                                            <div key={e.id} className={`group rounded-[2.5rem] overflow-hidden border shadow-sm transition-all hover:shadow-xl ${isNight ? 'bg-slate-800 border-slate-700 text-slate-200' : 'bg-white border-sage-100 text-slate-800'}`}>
                                                <div className="aspect-video overflow-hidden"><img src={e.image} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" /></div>
                                                <div className="p-8">
                                                    <p className="text-[10px] font-bold text-sage-600 uppercase tracking-widest mb-3">{e.date} • Spirit Transformed</p>
                                                    <p className="text-lg italic font-serif leading-relaxed opacity-90">"{e.comment}"</p>
                                                </div>
                                            </div>
                                        )) : <div className="col-span-full py-20 text-center opacity-40 italic font-serif text-xl">The Drive is empty. Upload in the Garden to see bloom here.</div>}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="py-12 border-t border-black/5 text-center opacity-50 text-sm">
                        <p>© 2024 Autobiography by Allen • Documenting the journey</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
